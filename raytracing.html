<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Raytracer 3D — Motor de Renderização em Tempo Real</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #00ff88;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.4em;
    color: #00ff88;
    text-shadow: 0 0 20px #00ff8888;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  #subtitle {
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    color: #00ff8866;
    margin-bottom: 12px;
  }

  #wrap {
    position: relative;
    border: 1px solid #00ff8833;
    box-shadow: 0 0 40px #00ff8820, inset 0 0 40px #00000080;
  }

  canvas {
    display: block;
    image-rendering: pixelated;
  }

  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    background:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,255,136,0.015) 2px,
        rgba(0,255,136,0.015) 4px
      );
  }

  #hud {
    position: absolute;
    top: 8px; left: 12px;
    font-size: 0.55rem;
    color: #00ff8877;
    line-height: 1.7;
    pointer-events: none;
  }

  #stats {
    position: absolute;
    top: 8px; right: 12px;
    font-size: 0.55rem;
    color: #00ff8877;
    line-height: 1.7;
    text-align: right;
    pointer-events: none;
  }

  #controls {
    margin-top: 10px;
    font-size: 0.55rem;
    color: #00ff8844;
    letter-spacing: 0.15em;
    text-align: center;
    line-height: 1.9;
  }

  #controls span {
    color: #00ff8899;
  }

  .corner {
    position: absolute;
    width: 12px; height: 12px;
    border-color: #00ff88;
    border-style: solid;
    opacity: 0.5;
  }
  .tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
  .tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
  .bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
  .br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
</style>
</head>
<body>

<h1>RayTracer Engine</h1>
<div id="subtitle">JavaScript · Zero Dependencies · CPU Rendering</div>

<div id="wrap">
  <canvas id="c"></canvas>
  <div id="overlay"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <div id="hud">
    CAM_POS: <span id="camPos">—</span><br>
    CAM_ROT: <span id="camRot">—</span><br>
    BOUNCES: <span id="bounces">3</span><br>
    OBJECTS: <span id="objCount">—</span><br>
    SHADOWS: ON<br>
    REFLECT: ON
  </div>
  <div id="stats">
    FPS: <span id="fps">—</span><br>
    RES: <span id="res">—</span><br>
    RAYS/F: <span id="raysf">—</span><br>
    FRAME: <span id="frame">0</span>
  </div>
</div>

<div id="controls">
  <span>W A S D</span> mover câmera &nbsp;|&nbsp; <span>MOUSE</span> olhar &nbsp;|&nbsp; <span>Q/E</span> subir/descer<br>
  <span>1-4</span> qualidade de renderização &nbsp;|&nbsp; <span>CLICK</span> capturar mouse
</div>

<script>
// ─── VECTOR MATH ──────────────────────────────────────────────────────────────
const V = {
  mk: (x=0,y=0,z=0) => ({x,y,z}),
  add: (a,b) => ({x:a.x+b.x, y:a.y+b.y, z:a.z+b.z}),
  sub: (a,b) => ({x:a.x-b.x, y:a.y-b.y, z:a.z-b.z}),
  mul: (a,t) => ({x:a.x*t, y:a.y*t, z:a.z*t}),
  dot: (a,b) => a.x*b.x + a.y*b.y + a.z*b.z,
  cross:(a,b) => ({x:a.y*b.z-a.z*b.y, y:a.z*b.x-a.x*b.z, z:a.x*b.y-a.y*b.x}),
  len: a => Math.sqrt(V.dot(a,a)),
  norm: a => { const l=V.len(a)||1e-9; return V.mul(a,1/l); },
  neg: a => ({x:-a.x,y:-a.y,z:-a.z}),
  reflect: (d,n) => V.sub(d, V.mul(n, 2*V.dot(d,n))),
  lerp: (a,b,t) => V.add(V.mul(a,1-t), V.mul(b,t)),
};

// ─── SCENE ────────────────────────────────────────────────────────────────────
const SCENE = {
  spheres: [
    // x, y, z, radius, color{r,g,b}, reflectivity, roughness, emission
    { pos:V.mk(0,0,0),    r:1.2,  col:{r:0.9,g:0.1,b:0.1}, refl:0.6, rough:0.05, emit:0 },
    { pos:V.mk(2.8,0.4,1),r:0.8,  col:{r:0.1,g:0.5,b:1.0}, refl:0.8, rough:0.02, emit:0 },
    { pos:V.mk(-2.5,0.2,0.5),r:1.0,col:{r:0.1,g:0.9,b:0.4},refl:0.3,rough:0.3,  emit:0 },
    { pos:V.mk(0.5,0,-2.5),r:0.7, col:{r:1.0,g:0.7,b:0.1}, refl:0.9, rough:0.01, emit:0 },
    { pos:V.mk(-1.2,1.8,-1),r:0.5,col:{r:1.0,g:0.3,b:0.8}, refl:0.4, rough:0.15, emit:0 },
    { pos:V.mk(1.5,-0.6,2.5),r:0.6,col:{r:0.8,g:0.8,b:0.8},refl:0.95,rough:0.005,emit:0 },
    // emissive (light spheres)
    { pos:V.mk(3,5,-2),   r:0.5,  col:{r:1.0,g:0.9,b:0.7}, refl:0.0, rough:1.0,  emit:18 },
    { pos:V.mk(-4,4,1),   r:0.4,  col:{r:0.4,g:0.6,b:1.0}, refl:0.0, rough:1.0,  emit:12 },
  ],
  // infinite plane y = -1.2
  floor: { y: -1.2, col1:{r:0.08,g:0.08,b:0.08}, col2:{r:0.15,g:0.15,b:0.15}, refl:0.35 },
  bg: (rd) => {
    // HDR sky gradient
    const t = rd.y * 0.5 + 0.5;
    const top = {r:0.01, g:0.02, b:0.08};
    const bot = {r:0.0,  g:0.0,  b:0.02};
    const c = {
      r: top.r*t + bot.r*(1-t),
      g: top.g*t + bot.g*(1-t),
      b: top.b*t + bot.b*(1-t),
    };
    // star field
    const sx = Math.abs(Math.sin(rd.x*312.4+rd.y*178.2+rd.z*234.1));
    if(sx > 0.9993) { const s=sx*15; return {r:s,g:s,b:s}; }
    return c;
  }
};

// ─── RAY-SPHERE INTERSECT ─────────────────────────────────────────────────────
function hitSphere(ro, rd, sp) {
  const oc = V.sub(ro, sp.pos);
  const a = V.dot(rd,rd);
  const b = V.dot(oc,rd);
  const c = V.dot(oc,oc) - sp.r*sp.r;
  const disc = b*b - a*c;
  if(disc < 0) return null;
  const sq = Math.sqrt(disc);
  let t = (-b - sq) / a;
  if(t < 1e-4) t = (-b + sq) / a;
  if(t < 1e-4) return null;
  return t;
}

// ─── RAY-FLOOR INTERSECT ──────────────────────────────────────────────────────
function hitFloor(ro, rd) {
  if(Math.abs(rd.y) < 1e-6) return null;
  const t = (SCENE.floor.y - ro.y) / rd.y;
  if(t < 1e-4) return null;
  return t;
}

// ─── SCENE INTERSECT ──────────────────────────────────────────────────────────
function intersect(ro, rd) {
  let best = Infinity, obj = null, isFloor = false;
  for(const sp of SCENE.spheres) {
    const t = hitSphere(ro, rd, sp);
    if(t && t < best) { best = t; obj = sp; isFloor = false; }
  }
  const tf = hitFloor(ro, rd);
  if(tf && tf < best) { best = tf; obj = null; isFloor = true; }
  return { t: best, obj, isFloor };
}

// ─── SHADOW TEST ──────────────────────────────────────────────────────────────
function inShadow(ro, lightPos) {
  const lv = V.sub(lightPos, ro);
  const dist = V.len(lv);
  const rd = V.norm(lv);
  for(const sp of SCENE.spheres) {
    if(sp.emit > 0) continue;
    const t = hitSphere(ro, rd, sp);
    if(t && t < dist - 0.01) return true;
  }
  return false;
}

// ─── TONE MAPPING ─────────────────────────────────────────────────────────────
function aces(x) {
  const a=2.51, b=0.03, c=2.43, d=0.59, e=0.14;
  return Math.max(0, Math.min(1, (x*(a*x+b))/(x*(c*x+d)+e)));
}

// ─── TRACE ────────────────────────────────────────────────────────────────────
function trace(ro, rd, depth) {
  if(depth <= 0) return {r:0,g:0,b:0};

  const { t, obj, isFloor } = intersect(ro, rd);
  if(t === Infinity) return SCENE.bg(rd);

  const hit = V.add(ro, V.mul(rd, t));
  let normal, mat;

  if(isFloor) {
    normal = V.mk(0,1,0);
    const px = Math.floor(hit.x*1.5), pz = Math.floor(hit.z*1.5);
    const checker = (px+pz)%2===0;
    mat = {
      col: checker ? SCENE.floor.col1 : SCENE.floor.col2,
      refl: SCENE.floor.refl * (checker ? 0.8 : 0.3),
      rough: 0.12,
      emit: 0,
    };
  } else {
    normal = V.norm(V.sub(hit, obj.pos));
    mat = obj;
  }

  // if emissive, just return emission
  if(mat.emit > 0) {
    return { r: mat.col.r*mat.emit, g: mat.col.g*mat.emit, b: mat.col.b*mat.emit };
  }

  // ── LIGHTING ──
  let directR = 0, directG = 0, directB = 0;

  for(const light of SCENE.spheres) {
    if(light.emit === 0) continue;

    const lv = V.sub(light.pos, hit);
    const ldist = V.len(lv);
    const ldir = V.norm(lv);

    const shadow = inShadow(V.add(hit, V.mul(normal, 1e-3)), light.pos);
    if(shadow) continue;

    // diffuse
    const diff = Math.max(0, V.dot(normal, ldir));
    // specular (Blinn-Phong)
    const halfV = V.norm(V.sub(ldir, rd));
    const shine = Math.max(0, Math.pow(Math.max(0, V.dot(normal, halfV)), 1 / (mat.rough + 0.001)));
    const atten = light.emit / (ldist * ldist * 0.15 + 1);

    directR += (mat.col.r * diff + shine * 0.4) * light.col.r * atten;
    directG += (mat.col.g * diff + shine * 0.4) * light.col.g * atten;
    directB += (mat.col.b * diff + shine * 0.4) * light.col.b * atten;
  }

  // ambient
  const amb = 0.04;
  directR += mat.col.r * amb;
  directG += mat.col.g * amb;
  directB += mat.col.b * amb;

  // ── REFLECTION ──
  let reflColor = {r:0,g:0,b:0};
  if(mat.refl > 0.01 && depth > 1) {
    const reflDir = V.norm(V.reflect(rd, normal));
    reflColor = trace(V.add(hit, V.mul(normal, 1e-3)), reflDir, depth-1);
  }

  return {
    r: directR*(1-mat.refl) + reflColor.r*mat.refl,
    g: directG*(1-mat.refl) + reflColor.g*mat.refl,
    b: directB*(1-mat.refl) + reflColor.b*mat.refl,
  };
}

// ─── CAMERA ───────────────────────────────────────────────────────────────────
const cam = {
  pos: V.mk(0, 1.5, 6),
  yaw: 0,
  pitch: -0.15,
  fov: 1.1,
};

function getCamVecs() {
  const cy = Math.cos(cam.yaw),   sy = Math.sin(cam.yaw);
  const cp = Math.cos(cam.pitch), sp = Math.sin(cam.pitch);
  const fwd = V.mk(-sy*cp, sp, -cy*cp);
  const right = V.mk(cy, 0, -sy);
  const up = V.cross(right, fwd);
  return { fwd: V.norm(fwd), right: V.norm(right), up: V.norm(up) };
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, scale = 2;
let imgData, buf;
let frameCount = 0, lastFPS = performance.now(), fpsVal = 0;
let maxBounces = 3;
let totalRays = 0;

function setScale(s) {
  scale = s;
  W = Math.floor(window.innerWidth * 0.72 / scale);
  H = Math.floor(window.innerHeight * 0.62 / scale);
  canvas.width = W; canvas.height = H;
  canvas.style.width  = W*scale + 'px';
  canvas.style.height = H*scale + 'px';
  imgData = ctx.createImageData(W, H);
  buf = imgData.data;
  document.getElementById('res').textContent = `${W}×${H} (${scale}x)`;
  document.getElementById('raysf').textContent = `~${(W*H/1000).toFixed(0)}K`;
  document.getElementById('objCount').textContent = SCENE.spheres.length + 1;
}

function renderFrame() {
  const { fwd, right, up } = getCamVecs();
  const aspect = W / H;

  for(let y = 0; y < H; y++) {
    for(let x = 0; x < W; x++) {
      const u = (x / W - 0.5) * 2 * aspect * cam.fov;
      const v = -(y / H - 0.5) * 2 * cam.fov;
      const rd = V.norm(V.add(V.add(V.mul(right, u), V.mul(up, v)), fwd));
      const c = trace(cam.pos, rd, maxBounces);

      // tone map + gamma
      const r = Math.pow(aces(c.r), 1/2.2);
      const g = Math.pow(aces(c.g), 1/2.2);
      const b = Math.pow(aces(c.b), 1/2.2);

      const i = (y*W+x)*4;
      buf[i]   = r*255 | 0;
      buf[i+1] = g*255 | 0;
      buf[i+2] = b*255 | 0;
      buf[i+3] = 255;
    }
  }
  ctx.putImageData(imgData, 0, 0);
}

// ─── INPUT ────────────────────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if(e.key==='1') setScale(4);
  if(e.key==='2') setScale(3);
  if(e.key==='3') setScale(2);
  if(e.key==='4') setScale(1);
});
document.addEventListener('keyup',  e => keys[e.key.toLowerCase()] = false);

let pointerLocked = false;
canvas.addEventListener('click', () => canvas.requestPointerLock());
document.addEventListener('pointerlockchange', () => {
  pointerLocked = document.pointerLockElement === canvas;
});
document.addEventListener('mousemove', e => {
  if(!pointerLocked) return;
  cam.yaw   += e.movementX * 0.003;
  cam.pitch  = Math.max(-1.3, Math.min(1.3, cam.pitch - e.movementY*0.003));
});

// ─── ANIMATE SCENE ────────────────────────────────────────────────────────────
let t0 = performance.now();
function animScene(t) {
  const s = t * 0.0003;
  SCENE.spheres[0].pos.x = Math.sin(s*1.1)*0.5;
  SCENE.spheres[0].pos.y = Math.sin(s*0.7)*0.4;
  SCENE.spheres[1].pos.z = Math.cos(s*0.9)*1.5 + 1;
  SCENE.spheres[3].pos.x = Math.cos(s*1.3)*2 + 0.5;
  SCENE.spheres[3].pos.y = Math.sin(s*0.6)*0.5;
  SCENE.spheres[4].pos.x = Math.sin(s*0.8)*2.5 - 1;
  SCENE.spheres[4].pos.z = Math.cos(s*1.2)*1.5 - 1;
  // lights orbit
  SCENE.spheres[6].pos.x = Math.cos(s*0.4)*5;
  SCENE.spheres[6].pos.z = Math.sin(s*0.4)*5 - 2;
  SCENE.spheres[7].pos.x = Math.cos(s*0.5+2)*4 - 1;
  SCENE.spheres[7].pos.z = Math.sin(s*0.5+2)*4;
}

// ─── LOOP ─────────────────────────────────────────────────────────────────────
function loop(t) {
  requestAnimationFrame(loop);
  animScene(t);

  // camera movement
  const { fwd, right } = getCamVecs();
  const speed = 0.06;
  if(keys['w']) cam.pos = V.add(cam.pos, V.mul(fwd,   speed));
  if(keys['s']) cam.pos = V.add(cam.pos, V.mul(fwd,  -speed));
  if(keys['a']) cam.pos = V.add(cam.pos, V.mul(right,-speed));
  if(keys['d']) cam.pos = V.add(cam.pos, V.mul(right, speed));
  if(keys['q']) cam.pos.y -= speed;
  if(keys['e']) cam.pos.y += speed;

  renderFrame();
  frameCount++;

  // HUD update
  if(t - lastFPS > 500) {
    fpsVal = (frameCount / ((t - lastFPS) / 1000)).toFixed(1);
    frameCount = 0; lastFPS = t;
    document.getElementById('fps').textContent = fpsVal;
    document.getElementById('frame').textContent = (++totalRays);
    document.getElementById('camPos').textContent =
      `${cam.pos.x.toFixed(2)}, ${cam.pos.y.toFixed(2)}, ${cam.pos.z.toFixed(2)}`;
    document.getElementById('camRot').textContent =
      `${(cam.yaw*57.3).toFixed(1)}°, ${(cam.pitch*57.3).toFixed(1)}°`;
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
setScale(2);
requestAnimationFrame(loop);
</script>
</body>
</html>
